    .link-button {

      font-size: 16px;
      background-color: white;
      border: none;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: all 0.2s ease-in-out;
    }

    .link-button:hover {
      background-color: #f0f0f0;

    }

    .social-icons {

    .social-icons a {

}

.sub-action a:hover {
